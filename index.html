<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Swarnapakshi Sweets | Heritage of Taste</title>
    <meta name="description" content="Where Every Bite Tells A Story. Authentic traditional South Indian sweets handcrafted with love in Adyar, Chennai." />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&family=Pinyon+Script&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    
    <!-- Main Styles -->
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <!-- SVG Definitions for Reusable Assets -->
    <svg width="0" height="0" style="position:absolute; width:0; height:0;">
      <defs>
        <!-- Filigree Border Corner Pattern -->
        <g id="filigree-corner">
          <!-- A placeholder geometric filigree representation that looks elegant -->
          <path d="M0,50 Q0,0 50,0 Q30,10 30,30 Q10,30 0,50 Z" fill="var(--color-gold)" />
          <path d="M5,50 Q5,5 50,5 Q35,15 35,35 Q15,35 5,50 Z" fill="none" stroke="var(--color-burnt-sienna)" stroke-width="1" />
        </g>
        
        <!-- Reusable Decorative Border Box -->
        <!-- We will use CSS border-image or background positioning instead to make it responsive,
             but we can keep these SVG symbols available if we want inline SVGs -->
        <g id="lotus-motif">
          <!-- Simplified Lotus Vector -->
          <path d="M25,50 C15,50 5,30 25,5 C45,30 35,50 25,50 Z" fill="var(--color-lotus-pink)" />
          <path d="M25,50 C10,45 0,25 20,20 C15,30 20,40 25,50 Z" fill="var(--color-lotus-pink)" opacity="0.8"/>
          <path d="M25,50 C40,45 50,25 30,20 C35,30 30,40 25,50 Z" fill="var(--color-lotus-pink)" opacity="0.8"/>
        </g>

        <!-- Peacock motif -->
        <g id="peacock-motif">
          <circle cx="25" cy="15" r="5" fill="var(--color-gold)" />
          <path d="M20,15 Q10,30 25,45 Q40,30 30,15" fill="var(--color-forest-green)" />
          <path d="M25,45 Q0,20 25,0 Q50,20 25,45 Z" fill="none" stroke="var(--color-gold)" stroke-width="1"/>
        </g>
      </defs>
    </svg>

    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
